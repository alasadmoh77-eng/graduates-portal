version: '3.9'

services:

  # ─── Application (PHP-FPM) ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: graduates_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-graduates_db}
      DB_USERNAME: ${DB_USERNAME:-graduates_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - graduates_net

  # ─── Web Server (Nginx) ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: graduates_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - graduates_net

  # ─── Database (PostgreSQL) ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: graduates_db
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-graduates_db}
      POSTGRES_USER: ${DB_USERNAME:-graduates_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - graduates_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-graduates_user} -d ${DB_DATABASE:-graduates_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graduates_net

  # ─── Cache / Queue (Redis) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: graduates_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - graduates_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graduates_net

  # ─── Queue Worker ──────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: graduates_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-graduates_db}
      DB_USERNAME: ${DB_USERNAME:-graduates_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
    depends_on:
      - app
      - db
      - redis
    networks:
      - graduates_net

# ─── Volumes ───────────────────────────────────────────────────────────
volumes:
  graduates_pgdata:
    driver: local
  graduates_redis_data:
    driver: local

# ─── Networks ──────────────────────────────────────────────────────────
networks:
  graduates_net:
    driver: bridge
